name: Deploy Static Website to EC2

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Set Permission on Key
    run: chmod 400 key.pem

  - name: Copy index.html to EC2
    run: |
      scp -o StrictHostKeyChecking=no \
        -i key.pem \
        index.html \
        ubuntu@ec2-65-0-125-210.ap-south-1.compute.amazonaws.com:/tmp/index.html

  - name: Deploy Website
    run: |
      ssh -o StrictHostKeyChecking=no \
        -i key.pem \
        ubuntu@ec2-65-0-125-210.ap-south-1.compute.amazonaws.com << 'EOF'
          sudo apt-get update
          sudo apt-get install -y nginx
          sudo mv /tmp/index.html /var/www/html/index.html
          sudo systemctl enable nginx
          sudo systemctl restart nginx
      EOF
```
